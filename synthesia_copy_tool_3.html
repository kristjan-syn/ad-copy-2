const AUDIENCES = ["Business Ops","Compliance Training","Customer Enablement","Customer Success","Customer Support","Dubbing","IT","Internal Comms","Knowledge Base","L&D","L&D-Director","L&D-Manager","Multiple","Product Demos","SOP","Sales","Sales Enablement","Technical Training","Training specialist"];
const STYLES = ["AI Polished","AI UGC","Motion-Design","NA","Polished-UGC","Studio","UGC"];

const audienceSel = document.getElementById('f-audience');
AUDIENCES.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; audienceSel.appendChild(o); });
const styleSel = document.getElementById('f-style');
STYLES.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; styleSel.appendChild(o); });

document.getElementById('f-keyword').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function doSearch() {
  const targeting = document.getElementById('f-targeting').value;
  const audience = document.getElementById('f-audience').value;
  const style = document.getElementById('f-style').value;
  const keyword = document.getElementById('f-keyword').value.trim().toLowerCase();

  let filtered = DATA.filter(r => {
    if (targeting && !r.targeting.includes(targeting)) return false;
    if (audience && !r.audiences.includes(audience)) return false;
    if (style && r.style !== style) return false;
    if (keyword) {
      const haystack = (r.meta_text + r.meta_headline + r.meta_description + r.li_text + r.li_headline + r.li_description).toLowerCase();
      if (!haystack.includes(keyword)) return false;
    }
    return true;
  });

  filtered = [...new Map(filtered.map(r => [r.meta_text, r])).values()];
  filtered.sort((a, b) => b.reuse_count - a.reuse_count);
  const top3 = filtered.slice(0, 3);

  const area = document.getElementById('results-area');
  if (top3.length === 0) {
    area.innerHTML = `<div class="no-results"><p>No copies found for this combination</p><span>Try broadening your filters</span></div>`;
    return;
  }

  const activeFilters = [targeting, audience, style, keyword ? '"' + keyword + '"' : ''].filter(Boolean);
  const filterDesc = activeFilters.length ? activeFilters.join(', ') : 'all';

  area.innerHTML = `<div class="results-header"><span class="results-title">Showing top <strong>${top3.length}</strong> most-reused ${top3.length === 1 ? 'copy' : 'copies'} for: <strong>${filterDesc}</strong></span><span class="results-title">${filtered.length} total match${filtered.length !== 1 ? 'es' : ''}</span></div>` +
    top3.map((r, i) => buildCard(r, i + 1)).join('');
}

function doReset() {
  document.getElementById('f-targeting').value = '';
  document.getElementById('f-audience').value = '';
  document.getElementById('f-style').value = '';
  document.getElementById('f-keyword').value = '';
  document.getElementById('results-area').innerHTML = `<div class="no-results"><p>Select filters above and click "Find top copies"</p><span>The 3 most-reused copies for your selection will appear here</span></div>`;
}

function buildCard(r, rank) {
  const targetingTags = r.targeting.map(t => `<span class="tag ${t === 'Cold' ? 'tag-cold' : 'tag-remarketing'}">${t}</span>`).join('');
  const audienceTags = r.audiences.slice(0,3).map(a => `<span class="tag tag-audience">${a}</span>`).join('');
  const styleTag = r.style && r.style !== 'NA' ? `<span class="tag tag-style">${r.style}</span>` : '';

  return `<div class="result-card">
    <div class="card-header">
      <div class="rank-badge">#${rank}</div>
      <div class="reuse-badge"><div class="reuse-dot"></div>Used ${r.reuse_count}x</div>
      <div class="tags">${targetingTags}${audienceTags}${styleTag}</div>
      <button class="copy-all-btn" onclick="copyAll(this, ${JSON.stringify(r)})">Copy all</button>
    </div>
    <div class="copy-grid">
      <div class="copy-section">
        <div class="copy-section-header">
          <svg class="platform-icon" viewBox="0 0 24 24" fill="#185fa5"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Meta copy
        </div>
        <div class="copy-fields">
          <div class="field"><div class="field-label">Text</div><div class="field-value long-text">${esc(r.meta_text)}</div><button class="copy-btn" onclick="copyField(this, ${JSON.stringify(r.meta_text)})">Copy</button></div>
          <div class="field"><div class="field-label">Headline</div><div class="field-value headline">${esc(r.meta_headline) || '<span class="empty">—</span>'}</div>${r.meta_headline ? `<button class="copy-btn" onclick="copyField(this, ${JSON.stringify(r.meta_headline)})">Copy</button>` : ''}</div>
          <div class="field"><div class="field-label">Description</div><div class="field-value">${esc(r.meta_description) || '<span class="empty">—</span>'}</div>${r.meta_description ? `<button class="copy-btn" onclick="copyField(this, ${JSON.stringify(r.meta_description)})">Copy</button>` : ''}</div>
        </div>
      </div>
      <div class="copy-section">
        <div class="copy-section-header">
          <svg class="platform-icon" viewBox="0 0 24 24" fill="#3b6d11"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          LinkedIn copy
        </div>
        <div class="copy-fields">
          <div class="field"><div class="field-label">Text</div><div class="field-value long-text">${r.li_text ? esc(r.li_text) : '<span class="empty">Not available</span>'}</div>${r.li_text ? `<button class="copy-btn" onclick="copyField(this, ${JSON.stringify(r.li_text)})">Copy</button>` : ''}</div>
          <div class="field"><div class="field-label">Headline</div><div class="field-value headline">${esc(r.li_headline) || '<span class="empty">—</span>'}</div>${r.li_headline ? `<button class="copy-btn" onclick="copyField(this, ${JSON.stringify(r.li_headline)})">Copy</button>` : ''}</div>
          <div class="field"><div class="field-label">Description</div><div class="field-value">${esc(r.li_description) || '<span class="empty">—</span>'}</div>${r.li_description ? `<button class="copy-btn" onclick="copyField(this, ${JSON.stringify(r.li_description)})">Copy</button>` : ''}</div>
        </div>
      </div>
    </div>
    <div class="ids-row">Ad IDs: <span class="ids-list">${r.venduo_ids ? r.venduo_ids.join(', ') : '—'}</span></div>
  </div>`;
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyField(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAll(btn, r) {
  const rows = [
    ['Meta Text',                        r.meta_text        || ''],
    ['Meta Headline',                    r.meta_headline    || ''],
    ['Meta Description',                 r.meta_description || ''],
    ['LinkedIn Text DCO (600)',          r.li_text          || ''],
    ['LinkedIn Short Text',              ''],
    ['LinkedIn Headline (200)',          r.li_headline      || ''],
    ['LinkedIn Description (image - 300)', r.li_description || ''],
    ['TikTok Text (100)',                ''],
    ['Reddit Headline (300)',            ''],
    ['Reddit Text (100)',                ''],
  ];
  const table = rows.map(([label, val]) => label + '\t' + val).join('\n');
  navigator.clipboard.writeText(table).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy all'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
